services:
  logitrack:
    build: .
    image: logitrack-v3-final  # <-- Este nombre tiene que ser nuevo
    container_name: logitrack-monolith-v3
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=192.168.1.22
    stdin_open: true
    tty: true
    command: npx expo start --host lan --port 8081

volumes:
  node_modules: